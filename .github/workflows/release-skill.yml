name: Release Skill

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and verify skill.zip
        run: bash scripts/package_skill.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/skill.zip \
            dist/SHA256SUMS \
            --verify-tag \
            --generate-notes \
            --title "${GITHUB_REF_NAME}"
